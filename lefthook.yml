pre-commit:
  parallel: true
  commands:
    biome:
      glob: "src/**/*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "src/**/*.ts"
      run: pnpm typecheck

pre-push:
  commands:
    test:
      run: pnpm test
